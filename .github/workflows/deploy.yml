name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Check bundle size
        run: |
          SIZE=$(gzip -c dist/bundle.js | wc -c)
          echo "Gzipped bundle size: ${SIZE} bytes"
          if [ $SIZE -gt 51200 ]; then
            echo "⚠️  Bundle exceeds 50KB gzipped target (${SIZE} bytes)"
          else
            echo "✅ Bundle size OK (${SIZE} bytes)"
          fi

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
